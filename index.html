<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Little Bami POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f5f5f5;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  background: white;
  padding: 10px;
  border-radius: 10px;
}

button {
  font-size: 20px;
  padding: 10px;
  border-radius: 50%;
  border: none;
}

.plus {
  background: green;
  color: white;
}

.minus {
  background: red;
  color: white;
}

.reset {
  margin-top: 20px;
  font-size: 18px;
  color: red;
  background: none;
  border: none;
}

.total {
  font-size: 24px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>🥖 Little Bami</h2>

<div id="list"></div>

<div class="total">Tổng: <span id="total">0</span> đ</div>

<button class="reset" onclick="reset()">RESET</button>

<script>
let items = [
  {name: "Bánh mì thịt nướng", price: 20000, qty: 0},
  {name: "Bánh mì thịt nướng", price: 25000, qty: 0},
  {name: "Bánh mì ốp la", price: 15000, qty: 0},
  {name: "Bánh mì ốp la", price: 20000, qty: 0},
  {name: "Bánh mì thịt chả", price: 20000, qty: 0},
  {name: "Bánh mì thịt chả", price: 25000, qty: 0},
  {name: "Bánh mì không", price: 3000, qty: 0},
];

function render(){
  let html = "";
  let total = 0;

  items.forEach((item, i) => {
    total += item.price * item.qty;

    html += `
    <div class="item">
      <div>
        <b>${item.name}</b><br>
        ${item.price.toLocaleString()} đ
      </div>

      <div>
        <button class="minus" onclick="minus(${i})">-</button>
        <span style="margin:0 10px">${item.qty}</span>
        <button class="plus" onclick="plus(${i})">+</button>
      </div>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("total").innerText = total.toLocaleString();
}

function plus(i){
  items[i].qty++;
  render();
}

function minus(i){
  if(items[i].qty > 0){
    items[i].qty--;
  }
  render();
}

function reset(){
  items.forEach(i => i.qty = 0);
  render();
}

render();
</script>

</body>
</html>
