<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Little Bami POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f5f5f5;
}

h2 {
  text-align: center;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  background: white;
  padding: 12px;
  border-radius: 12px;
}

button {
  font-size: 18px;
  padding: 8px 12px;
  border-radius: 50%;
  border: none;
}

.plus {
  background: green;
  color: white;
}

.minus {
  background: red;
  color: white;
}

.reset {
  margin-top: 15px;
  font-size: 16px;
  color: red;
  background: none;
  border: none;
}

.save {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background: green;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
}

.total {
  font-size: 22px;
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>🥖 Little Bami</h2>

<div id="list"></div>

<div class="total">Tổng: <span id="total">0</span> đ</div>

<button class="save" onclick="saveOrder()">💾 Lưu đơn</button>
<button class="reset" onclick="reset()">RESET</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBembvX5bvaYREuGj1FKhMneSU71XgkcvA",
  authDomain: "little-bami.firebaseapp.com",
  projectId: "little-bami",
  storageBucket: "little-bami.firebasestorage.app",
  messagingSenderId: "76478183596",
  appId: "1:76478183596:web:40444095e7944e2e744709",
  measurementId: "G-38BC7Q6Q80"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 Data
let items = [
  {name: "Bánh mì thịt nướng", price: 20000, qty: 0},
  {name: "Bánh mì thịt nướng", price: 25000, qty: 0},
  {name: "Bánh mì ốp la", price: 15000, qty: 0},
  {name: "Bánh mì ốp la", price: 20000, qty: 0},
  {name: "Bánh mì thịt chả", price: 20000, qty: 0},
  {name: "Bánh mì thịt chả", price: 25000, qty: 0},
  {name: "Bánh mì không", price: 3000, qty: 0},
];

// 🔥 Render
function render(){
  let html = "";
  let total = 0;

  items.forEach((item, i) => {
    total += item.price * item.qty;

    html += `
    <div class="item">
      <div>
        <b>${item.name}</b><br>
        ${item.price.toLocaleString()} đ
      </div>

      <div>
        <button class="minus" onclick="minus(${i})">-</button>
        <span style="margin:0 10px">${item.qty}</span>
        <button class="plus" onclick="plus(${i})">+</button>
      </div>
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("total").innerText = total.toLocaleString();
}

// 🔥 Actions
function plus(i){
  items[i].qty++;
  render();
}

function minus(i){
  if(items[i].qty > 0){
    items[i].qty--;
  }
  render();
}

function reset(){
  items.forEach(i => i.qty = 0);
  render();
}

// 🔥 SAVE ORDER
function saveOrder(){
  let total = items.reduce((s,i)=>s+i.price*i.qty,0);

  if(total === 0){
    alert("Chưa có món nào!");
    return;
  }

  db.collection("orders").add({
    items: items,
    total: total,
    time: new Date()
  });

  alert("✅ Đã lưu đơn!");
  reset();
}

// start
render();
</script>

</body>
</html>
