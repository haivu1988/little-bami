<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBembvX5bvaYREuGj1FKhMneSU71XgkcvA",
  authDomain: "little-bami.firebaseapp.com",
  projectId: "little-bami"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 REALTIME STATE
let items = [];

db.collection("state").doc("current").onSnapshot(doc => {
  if(doc.exists){
    items = doc.data().items;
    render();
  } else {
    initData();
  }
});

// 🔥 INIT LẦN ĐẦU
function initData(){
  items = [
    {name:"Bánh mì thịt nướng",price:20000,qty:0},
    {name:"Bánh mì thịt nướng",price:25000,qty:0},
    {name:"Bánh mì ốp la",price:15000,qty:0},
    {name:"Bánh mì ốp la",price:20000,qty:0},
    {name:"Bánh mì thịt chả",price:20000,qty:0},
    {name:"Bánh mì thịt chả",price:25000,qty:0},
    {name:"Bánh mì không",price:3000,qty:0},
  ];

  db.collection("state").doc("current").set({ items: items });
}

// 🔥 RENDER
function render(){
  let html="";
  let total=0;

  items.forEach((item,i)=>{
    total+=item.price*item.qty;

    html+=`
    <div class="item">
      <div>${item.name} (${item.price.toLocaleString()}đ)</div>
      <div>
        <button onclick="minus(${i})">-</button>
        ${item.qty}
        <button onclick="plus(${i})">+</button>
      </div>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("total").innerText=total.toLocaleString();
}

// 🔥 UPDATE FIREBASE
function updateDB(){
  db.collection("state").doc("current").set({ items: items });
}

// 🔥 ACTIONS
function plus(i){
  items[i].qty++;
  updateDB();
}

function minus(i){
  if(items[i].qty>0){
    items[i].qty--;
    updateDB();
  }
}

function reset(){
  items.forEach(i=>i.qty=0);
  updateDB();
}

// 🔥 LƯU LỊCH SỬ (giữ lại)
function saveOrder(){
  let total = items.reduce((s,i)=>s+i.price*i.qty,0);

  if(total===0){
    alert("Chưa có món!");
    return;
  }

  db.collection("orders").add({
    items:items,
    total:total,
    time:new Date()
  });

  alert("Đã lưu!");
  reset();
}
</script>
