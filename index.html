<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Little Bami POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f2f2f2;
}

h2 {
  text-align: center;
  font-size: 26px;
  margin-bottom: 15px;
}

/* CARD */
.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:12px 0;
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* TEXT */
.name {
  font-size:18px;
  font-weight:bold;
}

.price {
  font-size:14px;
  color:#666;
}

/* BUTTON GROUP */
.controls {
  display:flex;
  align-items:center;
  gap:10px;
}

/* BUTTON */
button {
  border:none;
  border-radius:50%;
  width:50px;
  height:50px;
  font-size:22px;
  font-weight:bold;
}

.plus {
  background:#00a86b;
  color:white;
}

.minus {
  background:#e74c3c;
  color:white;
}

.qty {
  font-size:20px;
  width:40px;
  text-align:center;
}

/* TOTAL */
.total {
  font-size:26px;
  font-weight:bold;
  text-align:center;
  margin-top:20px;
}

/* RESET BUTTON */
.reset {
  margin-top:20px;
  width:100%;
  padding:15px;
  font-size:18px;
  background:#ff3b30;
  color:white;
  border-radius:12px;
}
</style>
</head>

<body>

<h2>🥖 Little Bami</h2>

<div id="list"></div>

<div class="total">Tổng: <span id="total">0</span> đ</div>

<button class="reset" onclick="resetWithPass()">RESET</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBembvX5bvaYREuGj1FKhMneSU71XgkcvA",
  authDomain: "little-bami.firebaseapp.com",
  projectId: "little-bami"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// MENU
const defaultMenu = [
  {name:"Bánh mì thịt nướng",price:20000,qty:0},
  {name:"Bánh mì thịt nướng",price:25000,qty:0},
  {name:"Bánh mì ốp la",price:15000,qty:0},
  {name:"Bánh mì ốp la",price:20000,qty:0},
  {name:"Bánh mì thịt chả",price:20000,qty:0},
  {name:"Bánh mì thịt chả",price:25000,qty:0},
  {name:"Bánh mì không",price:3000,qty:0},

  {name:"Bánh bao trắng",price:20000,qty:0},
  {name:"Bánh bao vàng",price:22000,qty:0},
  {name:"Bánh bao dứa",price:25000,qty:0},
  {name:"Bánh bao xanh",price:16000,qty:0},
  {name:"Bánh giò",price:15000,qty:0},
];

let items = [];

// REALTIME
db.collection("state").doc("current").onSnapshot(doc => {
  if(doc.exists){
    let data = doc.data().items || [];

    if(data.length !== defaultMenu.length){
      items = defaultMenu;
      updateDB();
    } else {
      items = data;
    }

    render();
  } else {
    items = defaultMenu;
    updateDB();
  }
});

// UPDATE
function updateDB(){
  db.collection("state").doc("current").set({ items: items });
}

// RENDER
function render(){
  let html="";
  let total=0;

  items.forEach((item,i)=>{
    total+=item.price*item.qty;

    html+=`
    <div class="item">
      <div>
        <div class="name">${item.name}</div>
        <div class="price">${item.price.toLocaleString()} đ</div>
      </div>

      <div class="controls">
        <button class="minus" onclick="minus(${i})">-</button>
        <div class="qty">${item.qty}</div>
        <button class="plus" onclick="plus(${i})">+</button>
      </div>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("total").innerText=total.toLocaleString();
}

// ACTION
function plus(i){ items[i].qty++; updateDB(); }
function minus(i){ if(items[i].qty>0){ items[i].qty--; updateDB(); } }

// RESET CÓ PASS
function resetWithPass(){
  let pass = prompt("Nhập mật khẩu:");

  if(pass === "19021988"){
    items.forEach(i=>i.qty=0);
    updateDB();
    alert("Đã reset!");
  } else {
    alert("Sai mật khẩu!");
  }
}
</script>

</body>
</html>
